<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiếng Trung Huamei - Rút Gọn Link</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Huamei Link - Công cụ rút gọn liên kết nhanh chóng, dễ dàng và hoàn toàn miễn phí của Tiếng Trung Huamei.">
    <meta name="keywords" content="rút gọn link, huamei link, tiếng trung huamei, rút gọn liên kết, short link">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Tiếng Trung Huamei - Rút Gọn Link">
    <meta property="og:description" content="Huamei Link - Rút gọn liên kết nhanh chóng và dễ dàng. Chia sẻ miễn phí tài liệu học tiếng Trung.">
    <meta property="og:image" content="/thumbnail.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Tiếng Trung Huamei - Rút Gọn Link">
    <meta property="twitter:description" content="Huamei Link - Rút gọn liên kết nhanh chóng và dễ dàng. Chia sẻ miễn phí tài liệu học tiếng Trung.">
    <meta property="twitter:image" content="/thumbnail.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="thumbnail.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Huamei Link</h1>
            <p>Rút gọn link nhanh chóng và dễ dàng</p>
        </header>

        <main class="glass-panel">
            <form id="link-form">
                <div class="input-group">
                    <label for="slug">Đường dẫn rút gọn (Slug)</label>
                    <div class="input-wrapper">
                        <span class="prefix">tiengtrunghuamei.com.vn/</span>
                        <input type="text" id="slug" name="slug" placeholder="vd: a1 (để trống tự tạo)" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="destination">Đường dẫn gốc (Destination URL)</label>
                    <input type="url" id="destination" name="destination" placeholder="https://facebook.com/..." required autocomplete="off">
                </div>

                <button type="submit" id="submit-btn">
                    <span>Tạo Link</span>
                    <div class="loader" id="loader" style="display: none;"></div>
                </button>
            </form>

            <div id="result-message" class="message" style="display: none;"></div>
        </main>

        <section class="glass-panel links-list-section" style="margin-top: 2rem;">
            <h2 class="section-title">Danh sách Link đã rút gọn</h2>
            <div class="table-container">
                <table class="links-table">
                    <thead>
                        <tr>
                            <th>Link rút gọn</th>
                            <th>Đường dẫn gốc</th>
                            <th style="text-align: center;">Lượt click</th>
                            <th>Ngày tạo</th>
                            <th style="text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="links-list">
                        <tr>
                            <td colspan="5" class="empty-state">Đang tải danh sách link...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
